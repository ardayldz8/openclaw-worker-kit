version: v2
jobs:

  accomplish_demo:
    description: "Run a demo task via Accomplish bridge"
    command: "ACCOMPLISH_BRIDGE_MOCK=1 bash ./bin/accomplish_bridge.sh --task-file ./examples/accomplish_task_demo.txt"
    timeout_sec: 120
    retries: 1
    owner: "automation"
    tags: ["accomplish","bridge","demo"]
    resume_strategy: "best-effort"
  demo_hello:
    description: "Simple hello world job"
    owner: "platform"
    tags: ["demo","hello"]
    sla_sec: 60
    resume_strategy: "best-effort"
    command: "echo hello-from-manifest && date -u"
    timeout_sec: 60
    retries: 1

  demo_fail_once:
    description: "Sample failing job for retry/alert demo"
    command: "exit 1"
    timeout_sec: 30
    retries: 2
    env:
      OCW_ALERT_ENABLED: "0"


chains:
  demo_chain:
    steps:
      - demo_hello
      - demo_fail_once
      - demo_hello

  demo_checkpoint:
    description: "Resumable checkpoint demo"
    command: "TARGET=5 SLEEP_SEC=0.1 JOB_NAME=demo_checkpoint_job ./examples/demo_checkpoint_job.sh"
    timeout_sec: 120
    retries: 1

  resume_chain:
    steps:
      - demo_checkpoint
      - demo_hello

  demo_graph:
    start: start
    graph:
      start:
        job: demo_hello
        on_success: mid
        on_failure: end
      mid:
        job: demo_fail_once
        on_success: end
        on_failure: end
