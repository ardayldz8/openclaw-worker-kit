jobs:
  demo_hello:
    description: "Simple hello world job"
    command: "echo hello-from-manifest && date -u"
    timeout_sec: 60
    retries: 1

  demo_fail_once:
    description: "Sample failing job for retry/alert demo"
    command: "exit 1"
    timeout_sec: 30
    retries: 2
    env:
      OCW_ALERT_ENABLED: "0"


chains:
  demo_chain:
    steps:
      - demo_hello
      - demo_fail_once
      - demo_hello

  demo_checkpoint:
    description: "Resumable checkpoint demo"
    command: "TARGET=5 SLEEP_SEC=0.1 JOB_NAME=demo_checkpoint_job ./examples/demo_checkpoint_job.sh"
    timeout_sec: 120
    retries: 1

  resume_chain:
    steps:
      - demo_checkpoint
      - demo_hello
